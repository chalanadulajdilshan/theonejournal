<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The One Journal | Gulf, World, Business, Tech & Lifestyle News</title>
    <!-- Baseline SEO meta (per-article values override these at runtime via ArticlePage) -->
    <meta name="description" content="The One Journal — breaking news and in-depth coverage across the Gulf, world affairs, business, technology, sports and lifestyle." />
    <meta name="keywords" content="The One Journal, Gulf news, world news, business, technology, sports, lifestyle, breaking news" />
    <!-- Preload the main brand logo (LCP candidate) -->
    <link rel="preload" as="image" href="/logo.webp" type="image/webp" fetchpriority="high" />
    <!-- Cut TTFB on the logo by warming the connection early (same origin no-op, but harmless) -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <!-- Google Fonts: Inter (Sans-Serif) and Merriweather (Serif) - non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300&display=swap"></noscript>
  </head>
  <body>
    <div id="root">
      <!-- Static H1 + navigation for crawlers that don't execute JavaScript
           (e.g. SEO auditors). React replaces the entire contents of #root on
           mount, so real users never see this. The links give crawlers real
           internal links so the homepage isn't flagged as a dead-end entry page. -->
      <h1>The One Journal — Gulf, World, Business, Tech &amp; Lifestyle News</h1>
      <nav aria-label="Main sections">
        <ul>
          <li><a href="/#home">Home</a></li>
          <li><a href="/#live-updates">Live Updates</a></li>
          <li><a href="/#about-us">About Us</a></li>
          <li><a href="/#meet-our-team">Meet Our Team</a></li>
          <li><a href="/#careers">Careers</a></li>
          <li><a href="/#advertise">Advertise</a></li>
          <li><a href="/#contact-us">Contact Us</a></li>
          <li><a href="/#privacy-policy">Privacy Policy</a></li>
          <li><a href="/#terms-and-conditions">Terms &amp; Conditions</a></li>
          <li><a href="/#disclaimer">Disclaimer</a></li>
        </ul>
      </nav>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
